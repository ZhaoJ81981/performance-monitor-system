# Telegraf Configuration for Performance Monitor System

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = "$HOSTNAME"
  omit_hostname = false

# OUTPUT: Send metrics to InfluxDB
[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET}"
  timeout = "5s"

# INPUT: System metrics
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false
  fieldpass = ["usage_user", "usage_system", "usage_idle", "usage_iowait", "usage_steal"]
  tags = ["host"]

[[inputs.mem]]
  fieldpass = ["available", "free", "total", "used", "used_percent", "available_percent"]
  tags = ["host"]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "overlay", "squashfs"]
  fieldpass = ["free", "total", "used", "used_percent", "inodes_free", "inodes_total", "inodes_used"]
  tags = ["host", "device", "fstype", "path"]

[[inputs.diskio]]
  devices = ["sda", "sdb", "nvme0n1", "vda"]
  fieldpass = ["reads", "writes", "read_bytes", "write_bytes", "read_time", "write_time", "io_time"]
  tags = ["host", "name"]

[[inputs.net]]
  interfaces = ["eth0", "enp0s3", "en0", "wlan0"]
  fieldpass = ["bytes_sent", "bytes_recv", "packets_sent", "packets_recv", "err_in", "err_out", "drop_in", "drop_out"]
  tags = ["host", "interface"]

[[inputs.netstat]]
  fieldpass = ["tcp_established", "tcp_listen", "tcp_time_wait", "udp_socket"]
  tags = ["host"]

[[inputs.system]]
  fieldpass = ["load1", "load5", "load15", "n_cpus", "n_users"]
  tags = ["host"]

[[inputs.processes]]
  fieldpass = ["total", "running", "sleeping", "stopped", "zombie", "blocked"]
  tags = ["host"]

[[inputs.kernel]]
  fieldpass = ["boot_time", "context_switches", "interrupts", "processes_forked"]
  tags = ["host"]

# SMART disk health monitoring
[[inputs.smart]]
  attributes = true
  devices = ["/dev/sda", "/dev/sdb", "/dev/nvme0n1"]
  fieldpass = ["temperature", "power_on_hours", "reallocated_sector_ct", "pending_sector_ct", "uncorrectable_errors"]
  tags = ["host", "device", "model"]

# Docker container metrics (if Docker socket mounted)
[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  timeout = "5s"
  perdevice = true
  total = false
  fieldpass = ["cpu_usage", "mem_usage", "mem_limit", "net_rx_bytes", "net_tx_bytes", "block_read", "block_write"]
  taginclude = ["container_name", "container_image", "container_status"]
  tags = ["host"]

# Custom metric: Disk failure probability (from ML pipeline)
[[inputs.exec]]
  commands = ["python3 /app/src/collectors/disk_failure.py"]
  timeout = "10s"
  data_format = "influx"
  tags = ["host", "device"]

# Custom metric: Anomaly scores (from ML pipeline)
[[inputs.exec]]
  commands = ["python3 /app/src/collectors/anomaly_score.py"]
  timeout = "10s"
  data_format = "influx"
  tags = ["host", "metric_type"]

# PROCESSOR: Convert bytes to megabytes for readability
[[processors.converter]]
  [processors.converter.fields]
    integer = ["bytes_sent", "bytes_recv", "read_bytes", "write_bytes"]
    float = ["used_percent", "available_percent"]

# AGGREGATOR: Basic aggregations
[[aggregators.basicstats]]
  period = "60s"
  drop_original = false
  stats = ["mean", "min", "max", "stdev"]
  namepass = ["cpu", "mem", "disk", "diskio"]

# Custom Lua processor for advanced transformations
[[processors.lua]]
  namepass = ["cpu", "mem", "disk"]
  script = """
  function process(metric)
    -- Add derived metric: CPU pressure
    if metric.fields.usage_user then
      metric.fields.cpu_pressure = metric.fields.usage_user + metric.fields.usage_system
    end
    
    -- Add derived metric: Memory pressure
    if metric.fields.used_percent then
      metric.fields.mem_pressure = math.max(0, metric.fields.used_percent - 80) / 20
    end
    
    return metric
  end
  """